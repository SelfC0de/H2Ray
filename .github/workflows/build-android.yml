name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ inputs.build_type }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Restore Go caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: libxray-${{ runner.os }}-17fec28f-xray-b99c3e5

      - name: Build libXray AAR
        shell: bash
        run: |
          git clone https://github.com/XTLS/libXray.git "$RUNNER_TEMP/libXray"
          git -C "$RUNNER_TEMP/libXray" checkout 17fec28f6f9cf7ead6df6d639b6ca3abb7134ab0
          git clone --depth 1 --branch v26.6.22 https://github.com/XTLS/Xray-core.git "$RUNNER_TEMP/Xray-core"
          test "$(git -C "$RUNNER_TEMP/Xray-core" rev-parse HEAD)" = "b99c3e56574fb0317608c49dd1dd9af816db7a9e"
          export PATH="$PATH:$(go env GOPATH)/bin"
          python3 "$RUNNER_TEMP/libXray/build/main.py" android local
          mkdir -p app/libs app/src/main/assets
          cp "$RUNNER_TEMP/libXray/libXray.aar" app/libs/libXray.aar
          cp "$RUNNER_TEMP/libXray/dat/geoip.dat" app/src/main/assets/geoip.dat
          cp "$RUNNER_TEMP/libXray/dat/geosite.dat" app/src/main/assets/geosite.dat

      - name: Build APK
        shell: bash
        run: |
          if [[ "${{ inputs.build_type }}" == "release" ]]; then
            gradle :app:assembleRelease --stacktrace
          else
            gradle :app:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: h2ray-${{ inputs.build_type }}-${{ github.run_number }}
          path: app/build/outputs/apk/${{ inputs.build_type }}/*.apk
          if-no-files-found: error
          retention-days: 1
