name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: Public version (for example 1.0.0.24)
        required: true
        default: "1.0.0.24"
        type: string

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.4.1"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Restore Go caches
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: libxray-${{ runner.os }}-17fec28f-xray-b99c3e5

      - name: Build libXray AAR
        shell: bash
        run: |
          git clone https://github.com/XTLS/libXray.git "$RUNNER_TEMP/libXray"
          git -C "$RUNNER_TEMP/libXray" checkout 17fec28f6f9cf7ead6df6d639b6ca3abb7134ab0
          git clone --depth 1 --branch v26.6.22 https://github.com/XTLS/Xray-core.git "$RUNNER_TEMP/Xray-core"
          test "$(git -C "$RUNNER_TEMP/Xray-core" rev-parse HEAD)" = "b99c3e56574fb0317608c49dd1dd9af816db7a9e"
          export PATH="$PATH:$(go env GOPATH)/bin"
          python3 "$RUNNER_TEMP/libXray/build/main.py" android local
          mkdir -p app/libs app/src/main/assets
          cp "$RUNNER_TEMP/libXray/libXray.aar" app/libs/libXray.aar
          cp "$RUNNER_TEMP/libXray/dat/geoip.dat" app/src/main/assets/geoip.dat
          cp "$RUNNER_TEMP/libXray/dat/geosite.dat" app/src/main/assets/geosite.dat

      - name: Prepare release signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.H2RAY_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.H2RAY_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.H2RAY_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.H2RAY_KEY_PASSWORD }}
        run: |
          [[ "${{ inputs.version_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test -n "$KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/H2Ray-release.jks"
          chmod 600 "$RUNNER_TEMP/signing/H2Ray-release.jks"
          {
            echo "H2RAY_KEYSTORE_PATH=$RUNNER_TEMP/signing/H2Ray-release.jks"
            echo "H2RAY_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD"
            echo "H2RAY_KEY_ALIAS=$KEY_ALIAS"
            echo "H2RAY_KEY_PASSWORD=$KEY_PASSWORD"
            echo "H2RAY_VERSION_CODE=${{ github.run_number }}"
            echo "H2RAY_VERSION_NAME=${{ inputs.version_name }}"
          } >> "$GITHUB_ENV"

      - name: Build signed release APK
        shell: bash
        run: gradle :app:assembleRelease --stacktrace

      - name: Verify and name APK
        shell: bash
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          test -n "$APKSIGNER"
          "$APKSIGNER" verify --verbose "$APK"
          mkdir -p output
          cp "$APK" output/H2Ray.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: H2Ray-${{ inputs.version_name }}
          path: output/H2Ray.apk
          if-no-files-found: error
          retention-days: 1

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ inputs.version_name }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" output/H2Ray.apk \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" output/H2Ray.apk \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "H2Ray ${{ inputs.version_name }}" \
              --generate-notes
          fi
